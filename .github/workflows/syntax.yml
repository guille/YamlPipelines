name: Syntax Tests

on:
  push:
    paths:
      - '.github/workflows/syntax.yml'
      - '**.sublime-syntax'
      - '**/syntax_test*'
      - '**.tmPreferences'
  pull_request:
    paths:
      - '.github/workflows/syntax.yml'
      - '**.sublime-syntax'
      - '**/syntax_test*'
      - '**.tmPreferences'
  schedule:
    - cron: '03 01 * * 0'

jobs:
  main:
    name: Syntax Tests (${{ matrix.build }})
    strategy:
      matrix:
        include:
          - build: 4200
            packages: binary
            powershell: st4107-5.1.1
          - build: latest
            packages: master
            powershell: master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout PowerShell package (dependency)
        uses: actions/checkout@v6
        with:
          repository: SublimeText/PowerShell
          ref: ${{ matrix.powershell }}
          path: third-party/PowerShell
      - uses: SublimeText/syntax-test-action@v2
        with:
          build: ${{ matrix.build }}
          default_packages: ${{ matrix.packages }}
          package_root: third-party
          additional_packages: third-party/PowerShell
